name: sinpra_app
description: SINPRA DApp mobile client
publish_to: 'none'
version: 0.2.2+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.0
  go_router: ^13.0.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.20.2
  cached_network_image: ^3.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  jwt_decoder: ^2.0.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  webview_flutter: ^4.10.0
  uuid: ^4.5.1
  solana: ^0.31.0
  bip39: ^1.0.6
  ed25519_hd_key: ^2.3.0
  crypto: ^3.0.3
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/wallets/
